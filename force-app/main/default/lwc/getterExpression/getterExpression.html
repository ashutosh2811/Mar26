<template>
    <lightning-card>
        <h3 slot="title">
            <lightning-icon icon-name="utility:connected_apps" size="small"></lightning-icon>
            Getter example
        </h3>
        <div slot="footer">
                <lightning-badge label="Tag1"></lightning-badge>
                <lightning-badge label="Tag2"></lightning-badge>
                <lightning-badge label="Tag3"></lightning-badge>
        </div>
        <p class="slds-p-horizontal_small">Hello, <b>{UppercasefullName}</b></p>
        <div class="slds-p-around_medium lgc-bg">
            <lightning-input type="text" label="First Name" name="firstName" placeholder="type here..." onchange={handleInputChange}></lightning-input>
            <lightning-input type="text" label="Last Name" name="lastName" placeholder="type here..." onchange={handleInputChange}></lightning-input>
        </div>
    </lightning-card>

</template>
